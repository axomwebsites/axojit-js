<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Axojita Game Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="studio-container">
    <div class="top-bar">
        <div class="logo">AXOJITA GAME STUDIO</div>
        <div class="top-buttons">
            <button id="newCubeBtn">➕ Cube</button>
            <button id="newSphereBtn">⚪ Sphere</button>
            <button id="import3DBtn" class="accent">📁 Import 3D Model</button>
            <button id="importImageBtn">🖼️ Image Asset</button>
            <button id="importVideoBtn">🎬 Video Asset</button>
            <button id="importSoundBtn">🎵 Sound Asset</button>
            <button id="runScriptBtn" class="run-btn">▶ RUN GAME CODE</button>
        </div>
    </div>
    <div class="workspace">
        <div class="panel left-panel">
            <div class="panel-header">📦 ASSETS & OBJECTS</div>
            <div class="asset-section">
                <div class="subhead">3D Models / Objects</div>
                <div id="objectList" class="asset-list"></div>
                <div class="subhead">🖼️ Images / Videos</div>
                <div id="mediaAssets" class="asset-list"></div>
                <div class="subhead">🔊 Sounds</div>
                <div id="soundAssets" class="asset-list"></div>
            </div>
            <div class="panel-header" style="margin-top:12px">🎮 TRANSFORM</div>
            <div class="transform-panel">
                <label>X: <input type="number" id="posX" step="0.1"></label>
                <label>Y: <input type="number" id="posY" step="0.1"></label>
                <label>Z: <input type="number" id="posZ" step="0.1"></label>
                <button id="applyTransformBtn">Apply</button>
                <button id="deleteSelectedBtn">🗑️ Delete</button>
            </div>
        </div>
        <div class="viewport-area">
            <div id="gameCanvasContainer" class="canvas-wrapper"></div>
            <div class="status-line" id="statusMsg">Ready | Drag to orbit | 3D models appear here</div>
        </div>
        <div class="panel right-panel">
            <div class="panel-header">🎨 2D STUDIO (DRAW / PAINT)</div>
            <div class="paint-toolbar">
                <button id="penTool" class="tool-active">✏️ Pen</button>
                <button id="eraserTool">🧽 Eraser</button>
                <button id="rectTool">⬛ Rect</button>
                <button id="circleTool">⚪ Circle</button>
                <button id="fillTool">🪣 Fill</button>
                <input type="color" id="paintColor" value="#FF8844">
                <input type="range" id="paintSize" min="1" max="24" value="4"><span id="sizeLabel">4</span>
                <button id="clearCanvasBtn">🗑️ Clear</button>
            </div>
            <canvas id="paintCanvas" width="400" height="240" class="paint-canvas"></canvas>
            <div class="paint-actions">
                <button id="applyTextureToSelected">🎨 Apply Drawing to Selected 3D</button>
                <button id="createSpriteFromPaint">🖼️ Create Sprite (2D Plane)</button>
                <button id="exportDrawingAsset">💾 Save as Texture Asset</button>
            </div>
            <div class="panel-header" style="margin-top:12px">🧩 ADVANCED 2D PLUGINS</div>
            <div class="plugin-bar">
                <button id="outlinePlugin">✨ Outline Strokes</button>
                <button id="pixelatePlugin">🔲 Pixelate Effect</button>
                <button id="gradientFillPlugin">🌈 Gradient Fill</button>
                <button id="patternPlugin">🌀 Pattern Brush</button>
            </div>
            <div class="panel-header" style="margin-top:10px">💻 GAME SCRIPTING (JS)</div>
            <textarea id="codeEditor" class="code-area" spellcheck="false">// Axojita Game Engine API
let rotator = null;
engine.onStart(() => {
    rotator = engine.createCube(1, 0x44aa88);
    rotator.position.set(0, 1, 0);
    if(engine.sounds.size > 0) engine.playSound(Array.from(engine.sounds.keys())[0]);
});
engine.onUpdate((deltaTime) => {
    if(rotator) rotator.rotation.y += 1.5 * deltaTime;
});
</textarea>
            <div class="script-footer">
                <button id="evalScriptBtn" class="run-btn-small">🚀 Execute Script</button>
                <button id="resetScriptBtn">Reset Example</button>
            </div>
        </div>
    </div>
    <div class="asset-upload-hidden">
        <input type="file" id="modelFileInput" accept=".gltf,.glb,.obj" style="display:none">
        <input type="file" id="imageFileInput" accept="image/*" style="display:none">
        <input type="file" id="videoFileInput" accept="video/mp4,webm" style="display:none">
        <input type="file" id="soundFileInput" accept="audio/mpeg,audio/wav,audio/ogg" style="display:none">
    </div>
</div>
<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
        }
    }
</script>
<script type="module" src="main.js"></script>
</body>
</html>
