<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>axojite - game engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="axojite">
    <div class="topbar">
        <div class="logo">axojite</div>
        <div class="tabs">
            <button id="tab3dbtn" class="active"><i class="fas fa-cube"></i> 3d studio</button>
            <button id="tab2dbtn"><i class="fas fa-paintbrush"></i> 2d painter</button>
            <button id="tabguibtn"><i class="fas fa-window-maximize"></i> gui designer</button>
            <button id="tabcodebtn"><i class="fas fa-code"></i> script hub</button>
            <button id="tabanimbtn"><i class="fas fa-film"></i> animation</button>
            <button id="tabaibtn"><i class="fas fa-robot"></i> ai studio</button>
        </div>
        <div style="flex:1"></div>
        <button id="playruntime"><i class="fas fa-play"></i> play</button>
    </div>
    <div class="workspace">
        <div class="explorer">
            <h4><i class="fas fa-folder-open"></i> explorer 
                <button id="addplusbtn"><i class="fas fa-plus"></i></button>
            </h4>
            <div id="explorertree" class="tree"></div>
            <div class="section assetsection">
                <h4><i class="fas fa-database"></i> media library</h4>
                <div class="toolstrip">
                    <button id="uploadaudiobtn"><i class="fas fa-music"></i> audio</button>
                    <button id="uploadimagebtn"><i class="fas fa-image"></i> image</button>
                    <button id="uploadvideobtn"><i class="fas fa-video"></i> video</button>
                </div>
                <div id="medialist" class="medialist"></div>
            </div>
        </div>
        <div class="viewer">
            <div id="view3d" class="viewpanel activepanel"></div>
            <div id="view2d" class="viewpanel"></div>
            <div id="viewgui" class="viewpanel">
                <div class="guibar">
                    <button id="guieditmodebtn"><i class="fas fa-edit"></i> edit mode</button>
                    <button id="addscreengui"><i class="fas fa-desktop"></i> screengui</button>
                    <button id="addbillboardgui"><i class="fas fa-flag"></i> billboardgui</button>
                    <button id="addsurfacegui"><i class="fas fa-cube"></i> surfacegui</button>
                    <button id="addframe"><i class="fas fa-square"></i> frame</button>
                    <button id="addscrollingframe"><i class="fas fa-scroll"></i> scrollingframe</button>
                    <button id="addcanvasgroup"><i class="fas fa-layer-group"></i> canvasgroup</button>
                    <button id="addviewportframe"><i class="fas fa-camera"></i> viewportframe</button>
                    <button id="addtextlabel"><i class="fas fa-i"></i> textlabel</button>
                    <button id="addtextbutton"><i class="fas fa-font"></i> textbutton</button>
                    <button id="addtextbox"><i class="fas fa-keyboard"></i> textbox</button>
                    <button id="addimagelabel"><i class="fas fa-image"></i> imagelabel</button>
                    <button id="addimagebutton"><i class="fas fa-image"></i> imagebutton</button>
                    <button id="addvideoframe"><i class="fas fa-video"></i> videoframe</button>
                </div>
                <div id="guicontainer" class="guicontainer"></div>
                <div id="guiproperties" class="guiproperties"></div>
            </div>
            <div id="viewcode" class="viewpanel">
                <textarea id="codeeditor" placeholder="write your game logic here..."></textarea>
                <div class="codefooter">
                    <button id="savefilebtn"><i class="fas fa-save"></i> save script</button>
                    <button id="runscriptbtn"><i class="fas fa-rocket"></i> run</button>
                </div>
            </div>
            <div id="viewanim" class="viewpanel">
                <div class="animtoolbar">
                    <button id="newanimbtn"><i class="fas fa-plus"></i> new clip</button>
                    <button id="playanimbtn"><i class="fas fa-play"></i> play</button>
                    <button id="stopanimbtn"><i class="fas fa-stop"></i> stop</button>
                    <input type="text" id="animname" placeholder="clip name">
                </div>
                <div id="keyframelist" class="keyframelist"></div>
                <div class="addkeyframe">
                    <select id="propertyselect">
                        <option value="position">position</option>
                        <option value="rotation">rotation</option>
                        <option value="scale">scale</option>
                        <option value="color">material color</option>
                    </select>
                    <input type="number" id="keyframetime" placeholder="time (s)" step="0.1">
                    <button id="addkeyframebtn">add keyframe</button>
                </div>
            </div>
            <div id="viewai" class="viewpanel">
                <div class="aitoolbar">
                    <span class="betatag"><i class="fas fa-flask"></i> under development | beta</span>
                </div>
                <div class="aichat">
                    <div id="aichatlog" class="aichatlog"></div>
                    <div class="aichatinput">
                        <input type="text" id="aiprompt" placeholder="ask ai to create or modify... e.g., 'blue house'">
                        <button id="aisendbtn"><i class="fas fa-paper-plane"></i> generate</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="rightpanel">
            <div class="section">
                <h4><i class="fas fa-cog"></i> 3d properties</h4>
                <div id="proppanel">select an object</div>
            </div>
            <div class="section">
                <h4><i class="fas fa-palette"></i> poly haven materials</h4>
                <input type="text" id="materialsearch" placeholder="search materials...">
                <div id="materialgrid" class="modelgrid"></div>
            </div>
            <div class="section">
                <h4><i class="fas fa-cube"></i> poly haven models</h4>
                <input type="text" id="modelsearch" placeholder="search models...">
                <div id="modelgrid" class="modelgrid"></div>
            </div>
            <div class="section">
                <h4><i class="fas fa-shapes"></i> 2d shapes</h4>
                <div class="toolstrip">
                    <button id="addrect2d"><i class="fas fa-square"></i></button>
                    <button id="addcircle2d"><i class="fas fa-circle"></i></button>
                    <button id="addtriangle2d"><i class="fas fa-play"></i></button>
                    <button id="paintbrush2d"><i class="fas fa-paintbrush"></i></button>
                    <input type="color" id="color2d" value="#ff8844">
                </div>
            </div>
        </div>
    </div>
</div>
<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/",
            "fabric": "https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"
        }
    }
</script>
<script type="module" src="scripts/main.js"></script>
</body>
</html>
