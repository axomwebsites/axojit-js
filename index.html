<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>axojite - game engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;user-select:none}
        body{font-family:'Segoe UI','Inter',system-ui,sans-serif;background:#1e1e2f;overflow:hidden;height:100vh;color:#eef2ff}
        .axojite{display:flex;flex-direction:column;height:100%}
        .topbar{background:#2d2d3a;padding:6px 16px;display:flex;gap:20px;align-items:center;border-bottom:1px solid #3e3e4e;font-weight:600;font-size:14px}
        .topbar .logo{background:#ff8c42;padding:2px 12px;border-radius:20px;color:#1a1a2a}
        .topbar .tabs button{background:#3c3c4a;border:none;padding:6px 16px;border-radius:8px;cursor:pointer;color:#ddd;font-weight:500}
        .topbar .tabs button.active{background:#ff8c42;color:#111}
        .workspace{flex:1;display:flex;overflow:hidden}
        .explorer{width:280px;background:#252531;border-right:1px solid #3a3a48;display:flex;flex-direction:column;overflow-y:auto}
        .explorer h4{padding:12px 16px;background:#2f2f3d;margin:0;font-size:13px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #40404e}
        .explorer h4 button{background:#ff8c42;border:none;width:26px;height:26px;border-radius:4px;cursor:pointer;color:#111}
        .tree{padding:8px;flex:1;overflow-y:auto}
        .treeitem{padding:6px 8px;margin:2px 0;background:#2e2e3c;border-radius:6px;cursor:pointer;font-size:12px;display:flex;justify-content:space-between}
        .treeitem.selected{background:#ff8c42;color:black}
        .viewer{flex:1;position:relative;background:#15151f}
        .viewpanel{width:100%;height:100%;display:none}
        .viewpanel.activepanel{display:block}
        #view3d{background:#1a1a2a}
        #view2d{background:#2a2a2e;display:flex;justify-content:center;align-items:center}
        #fabriccanvas{width:100%;height:100%;background:#f0f2f5;box-shadow:0 0 0 2px #444}
        .rightpanel{width:320px;background:#252531;border-left:1px solid #3a3a48;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:12px}
        .section{background:#2e2e3c;border-radius:10px;padding:10px}
        .section h4{font-size:12px;margin-bottom:8px;border-left:3px solid #ff8c42;padding-left:8px}
        .toolstrip{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
        button,input,select{background:#3a3a4a;border:1px solid #555;border-radius:6px;padding:5px 8px;color:white;font-size:11px;cursor:pointer}
        .modelgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;max-height:200px;overflow-y:auto;margin-top:8px}
        .modelcard{background:#3f3f4f;border-radius:8px;padding:6px;text-align:center;cursor:pointer}
        .modelcard img{width:100%;height:60px;object-fit:cover;border-radius:4px}
        #viewcode{background:#1e1e2a;display:flex;flex-direction:column}
        #codeeditor{flex:1;background:#0f0f1a;font-family:monospace;font-size:13px;border:none;padding:12px;color:#eef;resize:none}
        .codefooter{padding:8px;background:#2d2d3a;display:flex;gap:12px}
        .medialist{margin-top:8px;max-height:150px;overflow-y:auto}
        .mediaitem{background:#3a3a4a;margin:4px 0;padding:5px;border-radius:6px;font-size:11px;display:flex;justify-content:space-between}
        .assetsection{margin-top:12px}
        .animtoolbar,.aitoolbar{background:#2d2d3a;padding:8px;display:flex;gap:8px;flex-wrap:wrap}
        .betatag{background:#7c3a2e;color:#ffb347;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:bold}
        .keyframelist,.aichatlog{background:#1e1e2a;padding:10px;height:200px;overflow-y:auto;margin:8px;font-size:12px}
        .keyframeitem,.chatmessage{background:#2e2e3c;margin:4px 0;padding:5px;border-radius:4px;display:flex;justify-content:space-between}
        .addkeyframe,.aichatinput{padding:8px;display:flex;gap:8px;flex-wrap:wrap}
        .guibar{background:#2d2d3a;padding:8px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid #3a3a48;max-height:80px;overflow-y:auto}
        .guicontainer{position:relative;width:100%;height:calc(100% - 80px);background:#2a2a2e;overflow:auto}
        .guiobject{position:absolute;border:1px solid #ff8c42;box-sizing:border-box}
        .guiobject.selected{border:2px solid #ffcc44;box-shadow:0 0 0 2px rgba(255,204,68,0.5)}
        .guiobject .resizehandle{position:absolute;width:8px;height:8px;background:#ffcc44;bottom:-4px;right:-4px;cursor:se-resize}
        .guiproperties{position:absolute;bottom:10px;right:10px;width:280px;background:#2d2d3a;border-radius:8px;padding:8px;font-size:11px;z-index:100;max-height:300px;overflow-y:auto}
        .guiproperties input,.guiproperties select{width:100%;margin:4px 0}
        .videoframe video{width:100%;height:100%;object-fit:cover}
    </style>
</head>
<body>
<div class="axojite">
    <div class="topbar">
        <div class="logo">axojite</div>
        <div class="tabs">
            <button id="tab3dbtn" class="active"><i class="fas fa-cube"></i> 3d studio</button>
            <button id="tab2dbtn"><i class="fas fa-paintbrush"></i> 2d painter</button>
            <button id="tabguibtn"><i class="fas fa-window-maximize"></i> gui designer</button>
            <button id="tabcodebtn"><i class="fas fa-code"></i> script hub</button>
            <button id="tabanimbtn"><i class="fas fa-film"></i> animation</button>
            <button id="tabaibtn"><i class="fas fa-robot"></i> ai studio</button>
        </div>
        <div style="flex:1"></div>
        <button id="playruntime"><i class="fas fa-play"></i> play</button>
    </div>
    <div class="workspace">
        <div class="explorer">
            <h4><i class="fas fa-folder-open"></i> explorer <button id="addplusbtn"><i class="fas fa-plus"></i></button></h4>
            <div id="explorertree" class="tree"></div>
            <div class="section assetsection">
                <h4><i class="fas fa-database"></i> media library</h4>
                <div class="toolstrip">
                    <button id="uploadaudiobtn"><i class="fas fa-music"></i> audio</button>
                    <button id="uploadimagebtn"><i class="fas fa-image"></i> image</button>
                    <button id="uploadvideobtn"><i class="fas fa-video"></i> video</button>
                </div>
                <div id="medialist" class="medialist"></div>
            </div>
        </div>
        <div class="viewer">
            <div id="view3d" class="viewpanel activepanel"></div>
            <div id="view2d" class="viewpanel"></div>
            <div id="viewgui" class="viewpanel">
                <div class="guibar">
                    <button id="guieditmodebtn"><i class="fas fa-edit"></i> edit mode</button>
                    <button id="addscreengui"><i class="fas fa-desktop"></i> screengui</button>
                    <button id="addframe"><i class="fas fa-square"></i> frame</button>
                    <button id="addtextbutton"><i class="fas fa-font"></i> textbutton</button>
                    <button id="addtextbox"><i class="fas fa-keyboard"></i> textbox</button>
                    <button id="addscrollingframe"><i class="fas fa-scroll"></i> scrollingframe</button>
                </div>
                <div id="guicontainer" class="guicontainer"></div>
                <div id="guiproperties" class="guiproperties"></div>
            </div>
            <div id="viewcode" class="viewpanel">
                <textarea id="codeeditor" placeholder="write your game logic here..."></textarea>
                <div class="codefooter">
                    <button id="savefilebtn"><i class="fas fa-save"></i> save script</button>
                    <button id="runscriptbtn"><i class="fas fa-rocket"></i> run</button>
                </div>
            </div>
            <div id="viewanim" class="viewpanel">
                <div class="animtoolbar">
                    <button id="newanimbtn"><i class="fas fa-plus"></i> new clip</button>
                    <button id="playanimbtn"><i class="fas fa-play"></i> play</button>
                    <button id="stopanimbtn"><i class="fas fa-stop"></i> stop</button>
                    <input type="text" id="animname" placeholder="clip name">
                </div>
                <div id="keyframelist" class="keyframelist"></div>
                <div class="addkeyframe">
                    <select id="propertyselect"><option value="position">position</option><option value="rotation">rotation</option><option value="scale">scale</option><option value="color">color</option></select>
                    <input type="number" id="keyframetime" placeholder="time (s)" step="0.1">
                    <button id="addkeyframebtn">add keyframe</button>
                </div>
            </div>
            <div id="viewai" class="viewpanel">
                <div class="aitoolbar"><span class="betatag"><i class="fas fa-flask"></i> under development | beta</span></div>
                <div class="aichat"><div id="aichatlog" class="aichatlog"></div><div class="aichatinput"><input type="text" id="aiprompt" placeholder="ask ai... e.g., 'big red wooden house'"><button id="aisendbtn"><i class="fas fa-paper-plane"></i> generate</button></div></div>
            </div>
        </div>
        <div class="rightpanel">
            <div class="section"><h4><i class="fas fa-cog"></i> 3d properties</h4><div id="proppanel">select an object</div></div>
            <div class="section"><h4><i class="fas fa-palette"></i> poly haven materials</h4><input type="text" id="materialsearch" placeholder="search materials..."><div id="materialgrid" class="modelgrid"></div></div>
            <div class="section"><h4><i class="fas fa-cube"></i> poly haven models</h4><input type="text" id="modelsearch" placeholder="search models..."><div id="modelgrid" class="modelgrid"></div></div>
            <div class="section"><h4><i class="fas fa-shapes"></i> 2d shapes</h4><div class="toolstrip"><button id="addrect2d"><i class="fas fa-square"></i></button><button id="addcircle2d"><i class="fas fa-circle"></i></button><button id="addtriangle2d"><i class="fas fa-play"></i></button><button id="paintbrush2d"><i class="fas fa-paintbrush"></i></button><input type="color" id="color2d" value="#ff8844"></div></div>
        </div>
    </div>
</div>
<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/",
            "fabric": "https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"
        }
    }
</script>
<script type="module">
    import * as THREE from 'three';
    import { orbitcontrols } from 'three/addons/controls/orbitcontrols.js';
    import { transformcontrols } from 'three/addons/controls/transformcontrols.js';
    import { gltfloader } from 'three/addons/loaders/gltfloader.js';

    let scene,camera,renderer,controls,transformcontrol,selectedobject=null;
    let fabriccanvas=null,isbrushmode=false,currentcolor='#ff8844',selected2dobject=null;
    let files=[{name:'main.lua',content:'let screen = instance.new("screengui")',type:'script'}],currentfileindex=0;
    let mediaassets=[];
    let animationmanager={clips:[],currentclipindex:-1,targetgetter:null,target2dgetter:null,createclip:function(n){let c=new animationclip(n);c.targetgetter=this.targetgetter;c.target2dgetter=this.target2dgetter;this.clips.push(c);this.currentclipindex=this.clips.length-1;return c},getcurrentclip:function(){return this.clips[this.currentclipindex]||null},addkeyframetocurrent:function(p,t,v){let c=this.getcurrentclip();if(c)c.addkeyframe(p,t,v)},playcurrent:function(){let c=this.getcurrentclip();if(c)c.start()},stopcurrent:function(){let c=this.getcurrentclip();if(c)c.stop()}};
    class animationclip{constructor(n){this.name=n;this.keyframes=[];this.duration=0;this.isplaying=false;this.currenttime=0;this.requestid=null;this.targetgetter=null;this.target2dgetter=null}addkeyframe(p,t,v){this.keyframes.push({property:p,time:t,value:v});this.keyframes.sort((a,b)=>a.time-b.time);this.duration=Math.max(this.duration,t)}evaluate(t){if(!this.targetgetter)return;let target=this.targetgetter();if(!target&&!this.target2dgetter)return;let is3d=!!target;let obj=is3d?target:this.target2dgetter();if(!obj)return;for(let kf of this.keyframes)if(t>=kf.time){if(is3d)updateobjecttransform(obj,kf.property,kf.value);else update2dobject(obj,kf.property,kf.value)}}start(){if(this.isplaying)this.stop();this.isplaying=true;this.currenttime=0;let st=performance.now()/1000;let step=(n)=>{let el=(performance.now()/1000)-st;this.currenttime=Math.min(el,this.duration);this.evaluate(this.currenttime);if(this.currenttime<this.duration)this.requestid=requestAnimationFrame(step);else{this.isplaying=false;this.requestid=null}};this.requestid=requestAnimationFrame(step)}stop(){if(this.requestid)cancelAnimationFrame(this.requestid);this.isplaying=false;this.requestid=null}}
    function updateobjecttransform(obj,prop,value){if(!obj)return;if(prop==='position')obj.position.set(value.x,value.y,value.z);else if(prop==='rotation')obj.rotation.set(value.x,value.y,value.z);else if(prop==='scale')obj.scale.set(value.x,value.y,value.z);else if(prop==='color'&&obj.material)obj.material.color.set(value.hex)}
    function update2dobject(obj,prop,value){if(!obj)return;if(prop==='position'){obj.left=value.x;obj.top=value.y;obj.setcoords()}else if(prop==='rotation')obj.angle=value.z*180/Math.PI;else if(prop==='scale'){obj.scalex=value.x;obj.scaley=value.y}else if(prop==='color')obj.set('fill',value.hex);fabriccanvas.renderall()}

    function init3dengine(containerid){
        let c=document.getElementById(containerid);
        scene=new THREE.Scene();scene.background=new THREE.Color(0x1a1a2a);scene.fog=new THREE.FogExp2(0x1a1a2a,0.008);
        camera=new THREE.PerspectiveCamera(45,c.clientWidth/c.clientHeight,0.1,500);camera.position.set(5,4,6);
        renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(c.clientWidth,c.clientHeight);renderer.shadowMap.enabled=true;c.appendChild(renderer.domElement);
        controls=new orbitcontrols(camera,renderer.domElement);controls.enableDamping=true;
        transformcontrol=new transformcontrols(camera,renderer.domElement);transformcontrol.addEventListener('draggingChanged',(e)=>{controls.enabled=!e.value});scene.add(transformcontrol);
        let amb=new THREE.AmbientLight(0x404060);scene.add(amb);
        let dir=new THREE.DirectionalLight(0xfff5e0,1.2);dir.position.set(3,5,2);dir.castShadow=true;scene.add(dir);
        let fill=new THREE.PointLight(0x88aaff,0.5);fill.position.set(-2,1,3);scene.add(fill);
        let grid=new THREE.GridHelper(12,20,0x88aaff,0x446688);grid.position.y=-0.8;scene.add(grid);
        window.addEventListener('resize',()=>{let w=c.clientWidth,h=c.clientHeight;camera.aspect=w/h;camera.updateProjectionMatrix();renderer.setSize(w,h)});
        function animate(){requestAnimationFrame(animate);controls.update();renderer.render(scene,camera)}animate();
    }
    function add3dobject(type,color=0xffaa66){let g;if(type==='cube')g=new THREE.BoxGeometry(1,1,1);else if(type==='sphere')g=new THREE.SphereGeometry(0.6,48,48);else if(type==='cylinder')g=new THREE.CylinderGeometry(0.6,0.6,1,32);else g=new THREE.PlaneGeometry(1.2,1.2);let m=new THREE.MeshStandardMaterial({color,roughness:0.3,metalness:0.1});let mesh=new THREE.Mesh(g,m);mesh.castShadow=true;mesh.receiveShadow=true;mesh.position.set(0,0.2,0);scene.add(mesh);selectobject(mesh);return mesh}
    function selectobject(obj){if(selectedobject)transformcontrol.detach();selectedobject=obj;transformcontrol.attach(selectedobject);let p=document.getElementById('proppanel');if(!selectedobject){p.innerHTML='no selection';return}p.innerHTML=`<div>pos: ${selectedobject.position.x.toFixed(2)},${selectedobject.position.y.toFixed(2)},${selectedobject.position.z.toFixed(2)}</div><input type="color" id="matcolor" value="#${selectedobject.material.color.getHexString()}"><input type="range" id="rough" min="0" max="1" step="0.01" value="${selectedobject.material.roughness}"><button id="applymat">apply</button>`;
        document.getElementById('matcolor')?.addEventListener('change',(e)=>selectedobject.material.color.set(e.target.value));
        document.getElementById('rough')?.addEventListener('input',(e)=>selectedobject.material.roughness=parseFloat(e.target.value));
    }
    function getselectedmesh(){return selectedobject}
    function recolorobject(obj,hex){if(!obj)return;if(obj.isMesh&&obj.material)obj.material.color.set(hex);else obj.traverse(c=>{if(c.isMesh&&c.material)c.material.color.set(hex)})}
    function loadmodelfromurl(url,name){new gltfloader().load(url,(g)=>{let m=g.scene;m.traverse(c=>{if(c.isMesh){c.castShadow=true;c.receiveShadow=true}});scene.add(m);selectobject(m)},undefined,()=>{})}

    function init2dengine(containerid){
        let c=document.getElementById(containerid);let ce=document.createElement('canvas');ce.id='fabriccanvas';ce.width=c.clientWidth;ce.height=c.clientHeight;c.appendChild(ce);
        fabriccanvas=new fabric.Canvas('fabriccanvas');fabriccanvas.setBackgroundColor('#f0f2f5',fabriccanvas.renderAll.bind(fabriccanvas));
        fabriccanvas.freeDrawingBrush.color=currentcolor;fabriccanvas.freeDrawingBrush.width=5;fabriccanvas.isDrawingMode=false;
        fabriccanvas.on('selection:created',(e)=>selected2dobject=e.selected[0]);fabriccanvas.on('selection:updated',(e)=>selected2dobject=e.selected[0]);fabriccanvas.on('selection:cleared',()=>selected2dobject=null);
        window.addEventListener('resize',()=>{let r=c.getBoundingClientRect();fabriccanvas.setWidth(r.width);fabriccanvas.setHeight(r.height);fabriccanvas.renderAll()});
    }
    function addrectangle(){let r=new fabric.Rect({width:80,height:80,fill:currentcolor,left:50,top:50});fabriccanvas.add(r);fabriccanvas.renderAll()}
    function addcircle(){let c=new fabric.Circle({radius:40,fill:currentcolor,left:150,top:100});fabriccanvas.add(c);fabriccanvas.renderAll()}
    function addtriangle(){let t=new fabric.Triangle({width:80,height:80,fill:currentcolor,left:250,top:60});fabriccanvas.add(t);fabriccanvas.renderAll()}
    function setbrushmode(active){isbrushmode=active;fabriccanvas.isDrawingMode=active;fabriccanvas.freeDrawingBrush.color=currentcolor}
    function setcolor2d(col){currentcolor=col;if(fabriccanvas.isDrawingMode)fabriccanvas.freeDrawingBrush.color=col}
    function getselected2dobject(){return selected2dobject}

    let guielements=[],selectedgui=null,editmode=true,guicontainer=null;
    class udim2{constructor(s1,o1,s2,o2){this{x:{scale:s1||0,offset:o1||0},y:{scale:s2||0,offset:o2||0}}}}
    class udim{constructor(s,o){this.scale=s||0;this.offset=o||0}}
    class color3{constructor(r,g,b){this.r=r||1;this.g=g||1;this.b=b||1}}
    class instancebase{constructor(cn){this._classname=cn;this._div=document.createElement('div');this._div.className='guiobject';this._div.style.position='absolute';this._div.style.left='0px';this._div.style.top='0px';this._div.style.width='100px';this._div.style.height='40px';this._parent=null;this._children=[];this._connections=new Map();this._properties={name:'',backgroundcolor3:new color3(0.2,0.4,1),visible:true,size:new udim2(0,100,0,40),position:new udim2(0,0,0,0),text:'',placeholder:''};this._videoelement=null}get parent(){return this._parent}set parent(p){if(this._parent)this._parent._removechild(this);this._parent=p;if(p)p._addchild(this)}_addchild(c){this._children.push(c);if(this._div&&c._div)this._div.appendChild(c._div)}_removechild(c){let i=this._children.indexOf(c);if(i!==-1)this._children.splice(i,1);if(c._div&&c._div.parentNode)c._div.parentNode.removeChild(c._div)}_applyproperties(){this._div.style.left=this._properties.position.x.offset+'px';this._div.style.top=this._properties.position.y.offset+'px';this._div.style.width=this._properties.size.x.offset+'px';this._div.style.height=this._properties.size.y.offset+'px';this._div.style.backgroundColor=`rgba(${this._properties.backgroundcolor3.r*255},${this._properties.backgroundcolor3.g*255},${this._properties.backgroundcolor3.b*255},1)`;this._div.style.display=this._properties.visible?'flex':'none';if(this._classname==='textlabel'||this._classname==='textbutton'||this._classname==='textbox'){let l=this._div.querySelector('.guilabel');if(l)l.innerText=this._properties.text}if(this._classname==='textbox'){let i=this._div.querySelector('input');if(i)i.placeholder=this._properties.placeholder}}get(p){if(p==='size')return this._properties.size;if(p==='position')return this._properties.position;if(p==='backgroundcolor3')return this._properties.backgroundcolor3;if(p==='visible')return this._properties.visible;if(p==='text')return this._properties.text;if(p==='placeholder')return this._properties.placeholder;return null}set(p,v){if(p==='size'){this._properties.size=v;this._applyproperties()}else if(p==='position'){this._properties.position=v;this._applyproperties()}else if(p==='backgroundcolor3'){this._properties.backgroundcolor3=v;this._applyproperties()}else if(p==='visible'){this._properties.visible=v;this._applyproperties()}else if(p==='text'){this._properties.text=v;this._applyproperties()}else if(p==='placeholder'){this._properties.placeholder=v;this._applyproperties()}}onevent(ev,cb){let domev=ev==='mousebutton1click'?'click':ev.toLowerCase();let handler=(e)=>{if(!editmode)cb(e)};this._div.addEventListener(domev,handler);this._connections.set(ev,handler)}destroy(){if(this._parent)this._parent._removechild(this);for(let[ev,fn]of this._connections)this._div.removeEventListener(ev.toLowerCase(),fn);this._div.remove();let i=guielements.indexOf(this);if(i!==-1)guielements.splice(i,1)}}
    class screengui extends instancebase{constructor(){super('screengui');this._div.style.width='100%';this._div.style.height='100%';this._div.style.position='relative';this._div.style.background='transparent';this._div.style.border='none';this._div.classList.remove('guiobject');this._div.classList.add('guicontainer');if(guicontainer){while(guicontainer.firstChild)guicontainer.removeChild(guicontainer.firstChild);guicontainer.appendChild(this._div)}guielements.push(this)}}
    class frame extends instancebase{constructor(){super('frame');this._addresizehandle();guielements.push(this)}_addresizehandle(){let h=document.createElement('div');h.className='resizehandle';this._div.appendChild(h)}}
    class textbutton extends instancebase{constructor(){super('textbutton');this._div.style.alignItems='center';this._div.style.justifyContent='center';this._div.style.borderRadius='4px';let s=document.createElement('span');s.className='guilabel';s.style.color='white';this._div.appendChild(s);this._addresizehandle();this._div.onclick=(e)=>{if(!editmode)this._triggerclick(e)};guielements.push(this)}_addresizehandle(){let h=document.createElement('div');h.className='resizehandle';this._div.appendChild(h)}_triggerclick(e){let c=this._connections.get('mousebutton1click');if(c)c(e)}}
    class textbox extends instancebase{constructor(){super('textbox');this._div.style.background='#eeeeee';this._div.style.border='1px solid #888';this._div.style.borderRadius='4px';let i=document.createElement('input');i.type='text';i.style.width='100%';i.style.height='100%';i.style.background='transparent';i.style.border='none';i.style.padding='4px';this._div.appendChild(i);this._addresizehandle();this._div.onclick=(e)=>e.stopPropagation();guielements.push(this)}_addresizehandle(){let h=document.createElement('div');h.className='resizehandle';this._div.appendChild(h)}}
    class scrollingframe extends instancebase{constructor(){super('scrollingframe');this._div.style.overflow='auto';this._div.style.border='1px solid #aaa';this._addresizehandle();guielements.push(this)}_addresizehandle(){let h=document.createElement('div');h.className='resizehandle';this._div.appendChild(h)}}
    const instance={new:(cn)=>{let m={'screengui':screengui,'frame':frame,'textbutton':textbutton,'textbox':textbox,'scrollingframe':scrollingframe};let c=m[cn.toLowerCase()];if(!c)throw new Error('unknown class');return new c()}};
    function seteditmode(m){editmode=m;document.querySelectorAll('.resizehandle').forEach(h=>h.style.display=m?'block':'none')}

    let modelmanifest=null;
    function appendchatmessage(role,text){let l=document.getElementById('aichatlog');if(!l)return;let d=document.createElement('div');d.className='chatmessage';d.innerHTML=`<span style="color:${role==='user'?'#ffaa66':'#88ffaa'}">${role==='user'?'you':'ai'}:</span> ${text}`;l.appendChild(d);l.scrollTop=l.scrollHeight}
    async function loadmanifest(){try{let r=await fetch('manifest.json');if(r.ok){modelmanifest=await r.json();appendchatmessage('system',`loaded ${modelmanifest.models?.length||0} local models`)}else appendchatmessage('system','no manifest.json, using primitives')}catch(e){appendchatmessage('system','manifest load failed, using primitives')}}
    function extractcolor(t){let m={red:'#ff3333',blue:'#3366ff',green:'#33cc33',yellow:'#ffcc00',orange:'#ff8833',purple:'#aa44ff',pink:'#ff66cc',black:'#222222',white:'#eeeeee',gray:'#888888',brown:'#8b4513',cyan:'#00cccc',magenta:'#ff44ff',lime:'#88ff44',teal:'#008080',gold:'#ffcc44',silver:'#c0c0c0',bronze:'#cd7f32',copper:'#b87333',brass:'#b5a642',wood:'#a56b3a',oak:'#7a5c3a',walnut:'#5c3a1a',mahogany:'#4a2512',stone:'#9a9a9a',marble:'#e8e4d8',granite:'#808080',concrete:'#666666',metal:'#aaaaaa',iron:'#6e6e6e',steel:'#b0b5b9',glass:'#aaffff',water:'#3399ff',ice:'#88ccff',fire:'#ff6633'};for(let[k,v]of Object.entries(m))if(t.includes(k))return v;return null}
    function extractobjecttype(t){let m={house:'house',home:'house',building:'house',cottage:'house',car:'car',vehicle:'car',truck:'car',tree:'tree',plant:'tree',bush:'tree',table:'table',desk:'table',chair:'chair',sofa:'couch',box:'cube',crate:'cube',sphere:'sphere',ball:'sphere',cylinder:'cylinder',pillar:'cylinder',tower:'tower',skyscraper:'tower',wall:'wall',fence:'wall',window:'window',door:'door',lamp:'lamp',light:'lamp',fountain:'fountain'};for(let[k,v]of Object.entries(m))if(t.includes(k))return v;return null}
    function applymaterial(obj,mat){if(!obj||!obj.material)return;let m=obj.material;if(mat==='wood'){m.color.setHex(0xa56b3a);m.roughness=0.7;m.metalness=0.05}else if(mat==='metal'){m.color.setHex(0xaaaaaa);m.roughness=0.3;m.metalness=0.9}else if(mat==='stone'){m.color.setHex(0x9a9a9a);m.roughness=0.8;m.metalness=0.1}else if(mat==='glass'){m.color.setHex(0xaaffff);m.roughness=0.1;m.metalness=0.9;m.transparent=true;m.opacity=0.6}else if(mat==='water'){m.color.setHex(0x3399ff);m.roughness=0.2;m.metalness=0.8;m.transparent=true;m.opacity=0.7}else if(mat==='fire'){m.color.setHex(0xff6633);m.roughness=0.4;m.metalness=0;m.emissive=new THREE.Color(0xff3300);m.emissiveIntensity=0.8}m.needsUpdate=true}
    function scalesize(obj,sz){if(!obj)return;let sx=1,sy=1,sz1=1;if(sz==='big'){sx=1.5;sy=1.5;sz1=1.5}else if(sz==='small'){sx=0.6;sy=0.6;sz1=0.6}else if(sz==='tall'){sx=0.8;sy=2.0;sz1=0.8}else if(sz==='wide'){sx=2.0;sy=0.8;sz1=1.0}obj.scale.set(sx,sy,sz1)}
    function createfallbackobject(otype,color,material,size){let mesh=null;if(otype==='house'){mesh=add3dobject('cube',color?parseInt(color.slice(1),16):0xcc8866);mesh.scale.set(1.2,1,1.2);let rgeo=new THREE.ConeGeometry(0.9,0.8,4);let rmat=new THREE.MeshStandardMaterial({color:0xaa6644});let roof=new THREE.Mesh(rgeo,rmat);roof.position.y=0.6;mesh.add(roof)}else if(otype==='car'){mesh=add3dobject('cube',color?parseInt(color.slice(1),16):0x3366ff);mesh.scale.set(1.2,0.4,0.8);let tgeo=new THREE.BoxGeometry(0.8,0.3,0.6);let tmat=new THREE.MeshStandardMaterial({color:0x88aaff});let top=new THREE.Mesh(tgeo,tmat);top.position.y=0.25;mesh.add(top)}else if(otype==='tree'){mesh=add3dobject('cylinder',color?parseInt(color.slice(1),16):0x88aa44);mesh.scale.set(0.4,0.8,0.4);let fgeo=new THREE.SphereGeometry(0.5,8,8);let fmat=new THREE.MeshStandardMaterial({color:0x44aa44});let fol=new THREE.Mesh(fgeo,fmat);fol.position.y=0.6;mesh.add(fol)}else if(otype==='table'){mesh=add3dobject('cube',color?parseInt(color.slice(1),16):0xaa8866);mesh.scale.set(1.2,0.2,0.8);let lgeo=new THREE.BoxGeometry(0.1,0.4,0.1);let lmat=new THREE.MeshStandardMaterial({color:0x886644});for(let[dx,dz]of[[-0.5,-0.3],[0.5,-0.3],[-0.5,0.3],[0.5,0.3]]){let leg=new THREE.Mesh(lgeo,lmat);leg.position.set(dx,-0.3,dz);mesh.add(leg)}}else if(otype==='chair'){mesh=add3dobject('cube',color?parseInt(color.slice(1),16):0xaa8866);mesh.scale.set(0.6,0.2,0.6);let bgeo=new THREE.BoxGeometry(0.6,0.5,0.1);let bmat=new THREE.MeshStandardMaterial({color:0x886644});let back=new THREE.Mesh(bgeo,bmat);back.position.set(0,0.3,-0.25);mesh.add(back);let lgeo=new THREE.BoxGeometry(0.08,0.3,0.08);let lmat=new THREE.MeshStandardMaterial({color:0x664422});for(let[dx,dz]of[[-0.25,-0.25],[0.25,-0.25],[-0.25,0.25],[0.25,0.25]]){let leg=new THREE.Mesh(lgeo,lmat);leg.position.set(dx,-0.2,dz);mesh.add(leg)}}else if(otype==='tower'){mesh=add3dobject('cylinder',color?parseInt(color.slice(1),16):0x99aacc);mesh.scale.set(0.8,2.0,0.8);let sgeo=new THREE.ConeGeometry(0.5,0.8,8);let smat=new THREE.MeshStandardMaterial({color:0xccaa88});let spire=new THREE.Mesh(sgeo,smat);spire.position.y=1.2;mesh.add(spire)}else if(otype==='lamp'){mesh=add3dobject('cylinder',color?parseInt(color.slice(1),16):0xddccaa);mesh.scale.set(0.3,0.6,0.3);let lgeo=new THREE.SphereGeometry(0.25,16,16);let lmat=new THREE.MeshStandardMaterial({color:0xffaa66,emissive:0xff6633,emissiveIntensity:0.5});let lamp=new THREE.Mesh(lgeo,lmat);lamp.position.y=0.45;mesh.add(lamp)}else{mesh=add3dobject('cube',color?parseInt(color.slice(1),16):0x88aa44)}if(mesh){if(color)recolorobject(mesh,color);if(material)applymaterial(mesh,material);if(size)scalesize(mesh,size)}appendchatmessage('ai',`created a ${size||'normal'} ${color||''} ${material||''} ${otype}`)}
    async function processaiprompt(prompt){
        appendchatmessage('user',prompt);let low=prompt.toLowerCase();let col=extractcolor(low);let otype=extractobjecttype(low);let mat=null;if(low.includes('wood'))mat='wood';if(low.includes('metal'))mat='metal';if(low.includes('stone'))mat='stone';if(low.includes('glass'))mat='glass';if(low.includes('water'))mat='water';if(low.includes('fire'))mat='fire';let size='normal';if(low.includes('big')||low.includes('large'))size='big';if(low.includes('small'))size='small';if(low.includes('tall'))size='tall';if(low.includes('wide'))size='wide';
        if(otype){createfallbackobject(otype,col,mat,size)}else if(getselectedmesh()){if(col)recolorobject(getselectedmesh(),col);if(mat)applymaterial(getselectedmesh(),mat);if(size)scalesize(getselectedmesh(),size);appendchatmessage('ai','modified selected object')}else{appendchatmessage('ai','no object selected. try "create a big red wooden house"')}
    }

    let activetab='3d';
    window.instance=instance;
    window.onload=()=>{
        init3dengine('view3d');init2dengine('view2d');
        guicontainer=document.getElementById('guicontainer');
        let tree=document.getElementById('explorertree');
        function rendertree(){tree.innerHTML='';files.forEach((f,i)=>{let d=document.createElement('div');d.className='treeitem'+(i===currentfileindex?' selected':'');d.innerHTML=`<i class="fas fa-file-code"></i> ${f.name} <span><i class="fas fa-trash-alt" data-idx="${i}" style="color:#ff8866"></i></span>`;d.onclick=(e)=>{if(e.target.tagName!=='I'){currentfileindex=i;document.getElementById('codeeditor').value=f.content;rendertree()}};let del=d.querySelector('.fa-trash-alt');if(del)del.onclick=(e)=>{e.stopPropagation();if(files.length>1){files.splice(i,1);if(currentfileindex>=files.length)currentfileindex=files.length-1;rendertree();document.getElementById('codeeditor').value=files[currentfileindex].content}};tree.appendChild(d)})}
        function addmedia(type,url){let div=document.createElement('div');div.className='mediaitem';div.innerHTML=`<i class="fas fa-${type==='audio'?'music':(type==='image'?'image':'video')}"></i> ${url.split('/').pop()} <button class="insertmedia">+</button>`;div.querySelector('.insertmedia').onclick=()=>{if(activetab==='3d'){let m=getselectedmesh();if(m&&m.material)new THREE.TextureLoader().load(url,(t)=>{m.material.map=t;m.material.needsUpdate=true})}else if(activetab==='2d')fabric.Image.fromURL(url,(img)=>fabriccanvas.add(img))};document.getElementById('medialist').appendChild(div)}
        document.getElementById('uploadaudiobtn').onclick=()=>{let inp=document.createElement('input');inp.type='file';inp.accept='audio/*';inp.onchange=(e)=>{let f=e.target.files[0];let u=URL.createObjectURL(f);mediaassets.push({type:'audio',name:f.name,url:u});addmedia('audio',u)};inp.click()};
        document.getElementById('uploadimagebtn').onclick=()=>{let inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.onchange=(e)=>{let f=e.target.files[0];let u=URL.createObjectURL(f);mediaassets.push({type:'image',name:f.name,url:u});addmedia('image',u)};inp.click()};
        document.getElementById('uploadvideobtn').onclick=()=>{let inp=document.createElement('input');inp.type='file';inp.accept='video/*';inp.onchange=(e)=>{let f=e.target.files[0];let u=URL.createObjectURL(f);mediaassets.push({type:'video',name:f.name,url:u});addmedia('video',u)};inp.click()};
        document.getElementById('addplusbtn').onclick=()=>{let n='script'+(files.length+1)+'.js';files.push({name:n,content:'// new script',type:'script'});currentfileindex=files.length-1;rendertree();document.getElementById('codeeditor').value=files[currentfileindex].content};
        document.getElementById('savefilebtn').onclick=()=>{if(files[currentfileindex])files[currentfileindex].content=document.getElementById('codeeditor').value};
        document.getElementById('runscriptbtn').onclick=()=>{let code=document.getElementById('codeeditor').value;try{let fn=new Function('instance','udim2','udim','color3',code);fn(instance,udim2,udim,color3)}catch(e){alert(e)}};
        document.getElementById('addrect2d').onclick=addrectangle;document.getElementById('addcircle2d').onclick=addcircle;document.getElementById('addtriangle2d').onclick=addtriangle;document.getElementById('paintbrush2d').onclick=()=>setbrushmode(true);document.getElementById('color2d').onchange=(e)=>setcolor2d(e.target.value);
        document.getElementById('guieditmodebtn').onclick=()=>{let btn=document.getElementById('guieditmodebtn');btn.classList.toggle('active');seteditmode(btn.classList.contains('active'))};
        document.getElementById('addscreengui').onclick=()=>instance.new('screengui');document.getElementById('addframe').onclick=()=>{let f=instance.new('frame');f.set('size',new udim2(0,160,0,100));f.set('position',new udim2(0,50,0,50))};document.getElementById('addtextbutton').onclick=()=>{let b=instance.new('textbutton');b.set('size',new udim2(0,120,0,40));b.set('position',new udim2(0,50,0,170));b.set('text','click')};document.getElementById('addtextbox').onclick=()=>{let t=instance.new('textbox');t.set('size',new udim2(0,150,0,30));t.set('position',new udim2(0,50,0,230))};document.getElementById('addscrollingframe').onclick=()=>{let s=instance.new('scrollingframe');s.set('size',new udim2(0,180,0,120));s.set('position',new udim2(0,220,0,50))};
        document.getElementById('playruntime').onclick=()=>{seteditmode(false);alert('runtime mode - gui interactive')};
        document.getElementById('newanimbtn').onclick=()=>{let n=document.getElementById('animname').value||'clip'+Date.now();animationmanager.createclip(n);renderkeyframelist()};
        document.getElementById('playanimbtn').onclick=()=>animationmanager.playcurrent();document.getElementById('stopanimbtn').onclick=()=>animationmanager.stopcurrent();
        document.getElementById('addkeyframebtn').onclick=()=>{let p=document.getElementById('propertyselect').value;let t=parseFloat(document.getElementById('keyframetime').value);if(isNaN(t))return;let target=getselectedmesh()||getselected2dobject();if(!target){alert('select an object');return}let v;if(p==='position')v={x:target.position.x,y:target.position.y,z:target.position.z};else if(p==='rotation')v={x:target.rotation.x,y:target.rotation.y,z:target.rotation.z};else if(p==='scale')v={x:target.scale.x,y:target.scale.y,z:target.scale.z};else if(p==='color')v={hex:target.material?.color?.getHexString()||'#ffaa66'};animationmanager.addkeyframetocurrent(p,t,v);renderkeyframelist()};
        function renderkeyframelist(){let c=document.getElementById('keyframelist');c.innerHTML='';let clip=animationmanager.getcurrentclip();if(!clip){c.innerHTML='<div>no clip selected</div>';return}clip.keyframes.forEach((kf,i)=>{let d=document.createElement('div');d.className='keyframeitem';d.innerHTML=`${kf.property} @ ${kf.time}s <button class="delkf" data-idx="${i}">x</button>`;d.querySelector('.delkf').onclick=()=>{clip.keyframes.splice(i,1);renderkeyframelist()};c.appendChild(d)})}
        document.getElementById('aisendbtn').onclick=()=>{let p=document.getElementById('aiprompt').value;if(p)processaiprompt(p);document.getElementById('aiprompt').value=''};
        function switchtab(tab){activetab=tab;document.querySelectorAll('.viewpanel').forEach(p=>p.classList.remove('activepanel'));document.getElementById(`view${tab}`).classList.add('activepanel');['3d','2d','gui','code','anim','ai'].forEach(t=>document.getElementById(`tab${t}btn`).classList.toggle('active',t===tab));if(tab==='code')document.getElementById('codeeditor').value=files[currentfileindex].content}
        document.getElementById('tab3dbtn').onclick=()=>switchtab('3d');document.getElementById('tab2dbtn').onclick=()=>switchtab('2d');document.getElementById('tabguibtn').onclick=()=>switchtab('gui');document.getElementById('tabcodebtn').onclick=()=>switchtab('code');document.getElementById('tabanimbtn').onclick=()=>switchtab('anim');document.getElementById('tabaibtn').onclick=()=>switchtab('ai');
        async function loadpolyhaven(type,gridid,searchid,isMaterial=false){let grid=document.getElementById(gridid);grid.innerHTML='<div>loading...</div>';try{let res=await fetch(`https://api.polyhaven.com/assets?t=${type}`);let data=await res.json();let keys=Object.keys(data).slice(0,24);grid.innerHTML='';for(let k of keys){let thumb=`https://cdn.polyhaven.com/asset_img/thumbs/${k}.png?width=200`;let card=document.createElement('div');card.className='modelcard';card.innerHTML=`<img src="${thumb}"><div>${k.slice(0,18)}</div>`;card.onclick=()=>{if(isMaterial){let m=getselectedmesh();if(m)new THREE.TextureLoader().load(`https://cdn.polyhaven.com/asset_img/primary/${k}.png`,tex=>{m.material.map=tex;m.material.needsUpdate=true})}else{loadmodelfromurl(`https://cdn.polyhaven.com/asset_img/primary/${k}.png?format=gltf`,k)}};grid.appendChild(card)}let search=document.getElementById(searchid);search.oninput=(e)=>{let q=e.target.value.toLowerCase();document.querySelectorAll(`#${gridid} .modelcard`).forEach(c=>{c.style.display=c.innerText.toLowerCase().includes(q)?'block':'none'})}}catch(e){grid.innerHTML='<div>failed to load</div>'}}
        loadpolyhaven('models','modelgrid','modelsearch',false);loadpolyhaven('textures','materialgrid','materialsearch',true);
        rendertree();animationmanager.targetgetter=getselectedmesh;animationmanager.target2dgetter=getselected2dobject;loadmanifest();
    };
</script>
</body>
