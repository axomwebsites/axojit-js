<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>axojita game engine</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="themedark">
<div class="appcontainer">
  <div class="viewport">
    <canvas id="enginecanvas"></canvas>
  </div>
  <div class="sidebar">
    <div class="sidebarheader">
      <span><i class="fas fa-cube"></i>engine</span>
      <div class="modeswitch">
        <button id="mode3dbtn" class="modebtn active"><i class="fas fa-cube"></i> 3d</button>
        <button id="mode2dbtn" class="modebtn"><i class="fas fa-square"></i> 2d</button>
      </div>
      <button id="themetogglebtn" class="btnsecondary">🌓</button>
    </div>
    <div class="tabbar">
      <div class="tab active" data-tab="explorer">explorer</div>
      <div class="tab" data-tab="properties">properties</div>
      <div class="tab" data-tab="animation">animation</div>
      <div class="tab" data-tab="physics">physics</div>
      <div class="tab" data-tab="particles">particles</div>
      <div class="tab" data-tab="script">script</div>
      <div class="tab" data-tab="assets">assets</div>
      <div class="tab" data-tab="lighting">lighting</div>
      <div class="tab" data-tab="sound">sound</div>
      <div class="tab" data-tab="navmesh">navmesh</div>
      <div class="tab" data-tab="tools">tools</div>
      <div class="tab" data-tab="export">export</div>
    </div>
    <div id="explorerpane" class="tabpane activepane"></div>
    <div id="propertiespane" class="tabpane"></div>
    <div id="animationpane" class="tabpane"></div>
    <div id="physicspane" class="tabpane"></div>
    <div id="particlespane" class="tabpane"></div>
    <div id="scriptpane" class="tabpane"></div>
    <div id="assetspane" class="tabpane"></div>
    <div id="lightingpane" class="tabpane"></div>
    <div id="soundpane" class="tabpane"></div>
    <div id="navmeshpane" class="tabpane"></div>
    <div id="toolspane" class="tabpane"></div>
    <div id="exportpane" class="tabpane"></div>
  </div>
</div>
<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
    }
  }
</script>
<script type="module" src="main.js"></script>
</body>
</html>
